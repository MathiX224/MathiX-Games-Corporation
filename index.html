<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>MathiX Games Corporation</title>

    <!-- Favicon -->
    <link rel="icon" type="image/png" href="logo.png">
    <link rel="shortcut icon" href="logo.png">
    <link rel="apple-touch-icon" href="logo.png">

    <style>

        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
        }

        body{
            height:100vh;
            overflow:hidden;
            background:#ffffff;
            font-family:'Segoe UI',sans-serif;
            display:flex;
            justify-content:center;
            align-items:center;
            position:relative;
        }

        /* Halo */

        .glow{
            position:absolute;
            width:900px;
            height:900px;
            border-radius:50%;
            background:radial-gradient(
                circle,
                rgba(0,0,0,0.10),
                transparent 70%
            );
            animation:pulse 5s infinite ease-in-out;
        }

        @keyframes pulse{
            0%,100%{
                transform:scale(1);
            }
            50%{
                transform:scale(1.25);
            }
        }

        /* Éclairs */

        .lightning{
            position:absolute;
            width:12px;
            height:260px;
            background:black;
            opacity:0;

            clip-path:polygon(
                50% 0%,
                100% 35%,
                70% 35%,
                100% 100%,
                0% 55%,
                30% 55%
            );

            animation:flash 2s infinite;
        }

        .l1{
            left:8%;
            top:8%;
        }

        .l2{
            right:12%;
            top:12%;
            animation-delay:.6s;
        }

        .l3{
            left:22%;
            bottom:8%;
            animation-delay:1s;
        }

        .l4{
            right:18%;
            bottom:12%;
            animation-delay:1.5s;
        }

        .l5{
            top:0;
            left:50%;
            animation-delay:.3s;
        }

        @keyframes flash{
            0%,90%,100%{
                opacity:0;
            }

            92%{
                opacity:1;
            }

            95%{
                opacity:.25;
            }

            98%{
                opacity:1;
            }
        }

        /* Container */

        .container{
            text-align:center;
            z-index:10;
        }

        /* Logo */

        .logo{
            width:420px;
            max-width:80vw;

            filter:drop-shadow(0 0 25px rgba(0,0,0,.2));

            animation:
            shake .08s infinite,
            floating 4s ease-in-out infinite;
        }

        @keyframes shake{
            0%{transform:translate(0px,0px);}
            25%{transform:translate(-1px,1px);}
            50%{transform:translate(1px,-1px);}
            75%{transform:translate(-1px,-1px);}
            100%{transform:translate(1px,1px);}
        }

        @keyframes floating{
            0%,100%{
                transform:translateY(0);
            }
            50%{
                transform:translateY(-12px);
            }
        }

        h1{
            margin-top:30px;
            font-size:4rem;
            font-weight:900;
            color:#000;
            letter-spacing:4px;
            text-transform:uppercase;
        }

        .subtitle{
            font-size:1.3rem;
            letter-spacing:8px;
            color:#444;
            margin-top:10px;
        }

        .description{
            margin-top:25px;
            color:#666;
            font-size:1.1rem;
        }

        /* Bouton Discord */

        .discord-btn{
            display:inline-block;
            margin-top:40px;
            padding:18px 42px;

            text-decoration:none;
            color:white;

            font-weight:800;
            font-size:1rem;
            letter-spacing:2px;
            text-transform:uppercase;

            background:black;

            border-radius:18px;

            transition:.3s;

            box-shadow:
                0 0 20px rgba(0,0,0,.25),
                0 0 50px rgba(0,0,0,.15);

            animation:glowBtn 2s infinite;
        }

        @keyframes glowBtn{
            0%,100%{
                box-shadow:
                    0 0 20px rgba(0,0,0,.25),
                    0 0 50px rgba(0,0,0,.15);
            }

            50%{
                box-shadow:
                    0 0 40px rgba(0,0,0,.45),
                    0 0 80px rgba(0,0,0,.25);
            }
        }

        .discord-btn:hover{
            transform:translateY(-5px) scale(1.05);
        }

        .discord-btn:active{
            transform:scale(.95);
        }

        /* Footer */

        footer{
            position:absolute;
            bottom:20px;
            left:0;
            right:0;
            text-align:center;
            color:#666;
            font-size:.9rem;
        }

        @media(max-width:768px){

            .logo{
                width:260px;
            }

            h1{
                font-size:2rem;
            }

            .subtitle{
                font-size:1rem;
                letter-spacing:4px;
            }

            .description{
                padding:0 20px;
                font-size:1rem;
            }
        }

    </style>
</head>
<body>

    <div class="glow"></div>

    <div class="lightning l1"></div>
    <div class="lightning l2"></div>
    <div class="lightning l3"></div>
    <div class="lightning l4"></div>
    <div class="lightning l5"></div>

    <div class="container">

        <img src="logo.png" alt="MathiX Games Logo" class="logo">

        <h1>MathiX Games</h1>

        <div class="subtitle">
            CORPORATION
        </div>

        <div class="description">
            Créons l'avenir du jeu vidéo.
        </div>

        <a
            href="https://discord.gg/QEhjJ82zme"
            target="_blank"
            class="discord-btn">
            Rejoindre le Discord
        </a>

        <a href="offres.html" class="discord-btn">
    Nos offres
</a>

        <a href="sites.html" class="discord-btn">
    Nos sites internet
</a>

    </div>

    <footer>
        © 2026 MathiX Games Corporation - Tous droits réservés
    </footer>

</body>
</html>
