<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MathiX Games Corporation</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    background:#ffffff;
    overflow:hidden;
    height:100vh;
    font-family:'Segoe UI',sans-serif;
    display:flex;
    justify-content:center;
    align-items:center;
    position:relative;
}

/* Fond lumineux */

body::before{
    content:"";
    position:absolute;
    width:1200px;
    height:1200px;
    background:radial-gradient(circle,
    rgba(0,0,0,0.08) 0%,
    rgba(0,0,0,0) 70%);
    animation:pulse 4s infinite;
}

@keyframes pulse{
    0%,100%{
        transform:scale(1);
    }
    50%{
        transform:scale(1.2);
    }
}

/* Container */

.container{
    text-align:center;
    z-index:10;
}

/* Logo */

.logo{
    width:420px;
    max-width:80vw;
    animation:
        shake 0.08s infinite,
        float 4s ease-in-out infinite;
    filter:drop-shadow(0 0 25px rgba(0,0,0,0.25));
}

/* Tremblement */

@keyframes shake{
    0%{transform:translate(0px,0px);}
    25%{transform:translate(-2px,1px);}
    50%{transform:translate(2px,-1px);}
    75%{transform:translate(-1px,-2px);}
    100%{transform:translate(1px,2px);}
}

/* Flottement */

@keyframes float{
    0%,100%{
        transform:translateY(0px);
    }
    50%{
        transform:translateY(-15px);
    }
}

/* Titre */

h1{
    margin-top:40px;
    font-size:4rem;
    color:#000;
    font-weight:900;
    letter-spacing:4px;
    text-transform:uppercase;
}

.subtitle{
    margin-top:10px;
    font-size:1.4rem;
    letter-spacing:6px;
    color:#444;
}

.slogan{
    margin-top:30px;
    font-size:1.2rem;
    color:#666;
}

/* Éclairs */

.lightning{
    position:absolute;
    width:12px;
    height:280px;
    background:black;

    clip-path:polygon(
    50% 0%,
    100% 35%,
    70% 35%,
    100% 100%,
    0% 55%,
    30% 55%
    );

    opacity:0;
}

.lightning:nth-child(1){
    top:5%;
    left:10%;
    animation:flash 2s infinite;
}

.lightning:nth-child(2){
    top:15%;
    right:15%;
    animation:flash 3s infinite 0.5s;
}

.lightning:nth-child(3){
    bottom:5%;
    left:25%;
    animation:flash 2.5s infinite 1s;
}

.lightning:nth-child(4){
    bottom:15%;
    right:20%;
    animation:flash 1.8s infinite;
}

.lightning:nth-child(5){
    top:0%;
    left:50%;
    animation:flash 2.2s infinite 1.3s;
}

@keyframes flash{
    0%,90%,100%{
        opacity:0;
    }

    92%{
        opacity:1;
    }

    94%{
        opacity:0.2;
    }

    96%{
        opacity:1;
    }
}

/* Responsive */

@media(max-width:768px){

    h1{
        font-size:2.2rem;
    }

    .subtitle{
        font-size:1rem;
        letter-spacing:3px;
    }

    .slogan{
        font-size:1rem;
        padding:0 20px;
    }

    .logo{
        width:280px;
    }
}

</style>
</head>

<body>

<div class="lightning"></div>
<div class="lightning"></div>
<div class="lightning"></div>
<div class="lightning"></div>
<div class="lightning"></div>

<div class="container">

    <!-- Remplace par ton logo -->
    <img src="MATHIX GAMES.png"
         alt="MathiX Games Corporation"
         class="logo">

    <h1>MathiX Games</h1>

    <div class="subtitle">
        CORPORATION
    </div>

    <div class="slogan">
        Creating the Future of Gaming
    </div>

</div>

</body>
</html>
