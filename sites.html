<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Nos Sites Internet - MathiX Games</title>

<link rel="icon" type="image/png" href="logo.png">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    background:#fff;
    font-family:'Segoe UI',sans-serif;
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    overflow:hidden;
    position:relative;
}

/* Halo */

.glow{
    position:absolute;
    width:1000px;
    height:1000px;
    border-radius:50%;
    background:radial-gradient(
        circle,
        rgba(0,0,0,.08),
        transparent 70%
    );
    animation:pulse 5s infinite;
}

@keyframes pulse{
    0%,100%{
        transform:scale(1);
    }

    50%{
        transform:scale(1.25);
    }
}

/* Éclairs */

.lightning{
    position:absolute;
    width:12px;
    height:260px;
    background:black;

    clip-path:polygon(
        50% 0%,
        100% 35%,
        70% 35%,
        100% 100%,
        0% 55%,
        30% 55%
    );

    opacity:0;
}

.l1{
    top:5%;
    left:8%;
    animation:flash 2s infinite;
}

.l2{
    top:10%;
    right:10%;
    animation:flash 3s infinite .5s;
}

.l3{
    bottom:5%;
    left:20%;
    animation:flash 2.5s infinite 1s;
}

.l4{
    bottom:10%;
    right:15%;
    animation:flash 2s infinite .8s;
}

.l5{
    top:0;
    left:50%;
    animation:flash 2.2s infinite 1.2s;
}

@keyframes flash{

    0%,90%,100%{
        opacity:0;
    }

    92%{
        opacity:1;
    }

    95%{
        opacity:.2;
    }

    98%{
        opacity:1;
    }
}

/* Container */

.container{
    text-align:center;
    z-index:10;
}

/* Logo */

.logo{
    width:220px;
    max-width:80vw;

    animation:
    shake .08s infinite,
    floating 4s ease-in-out infinite;

    filter:drop-shadow(0 0 20px rgba(0,0,0,.2));
}

@keyframes shake{
    0%{transform:translate(0,0);}
    25%{transform:translate(-1px,1px);}
    50%{transform:translate(1px,-1px);}
    75%{transform:translate(-1px,-1px);}
    100%{transform:translate(1px,1px);}
}

@keyframes floating{
    0%,100%{
        transform:translateY(0);
    }

    50%{
        transform:translateY(-12px);
    }
}

h1{
    margin-top:20px;
    font-size:3rem;
    font-weight:900;
    letter-spacing:4px;
    text-transform:uppercase;
}

.subtitle{
    color:#666;
    margin-top:10px;
    margin-bottom:40px;
}

/* Liste des sites */

.sites-list{
    display:flex;
    flex-direction:column;
    gap:20px;
    align-items:center;
}

/* Boutons */

.site-btn{
    display:inline-block;

    min-width:280px;

    padding:18px 40px;

    background:black;
    color:white;

    text-decoration:none;
    font-weight:800;
    letter-spacing:2px;

    border-radius:18px;

    transition:.3s;

    box-shadow:
    0 0 20px rgba(0,0,0,.25),
    0 0 50px rgba(0,0,0,.15);
}

.site-btn:hover{

    transform:
    translateY(-5px)
    scale(1.05);

    box-shadow:
    0 0 40px rgba(0,0,0,.45),
    0 0 80px rgba(0,0,0,.25);
}

.back-btn{
    display:inline-block;
    margin-top:30px;

    color:black;
    text-decoration:none;
    font-weight:700;
}

footer{
    position:absolute;
    bottom:20px;
    width:100%;
    text-align:center;
    color:#666;
    font-size:.9rem;
}

@media(max-width:768px){

    body{
        overflow:auto;
        padding:30px 0;
    }

    h1{
        font-size:2rem;
    }

    .logo{
        width:160px;
    }

    .site-btn{
        min-width:240px;
    }
}

</style>
</head>
<body>

<div class="glow"></div>

<div class="lightning l1"></div>
<div class="lightning l2"></div>
<div class="lightning l3"></div>
<div class="lightning l4"></div>
<div class="lightning l5"></div>

<div class="container">

    <img src="logo.png" alt="MathiX Games" class="logo">

    <h1>Nos Sites Internet</h1>

    <div class="subtitle">
        Découvrez les projets de MathiX Games Corporation
    </div>

    <div class="sites-list">

        <a
        href="https://mathix224.github.io/astralys-site/"
        target="_blank"
        class="site-btn">
            ✦ ASTRALYS ✦
        </a>

        <a
        href="https://mathix224.github.io/Sunraku/"
        target="_blank"
        class="site-btn">
            ✦ SUNRAKU ✦
        </a>

        <a
        href="https://mathix224.github.io/Perpignan-RP/index.html"
        target="_blank"
        class="site-btn">
            ✦ PERPIGNAN RP ✦
        </a>

    </div>

    <a href="index.html" class="back-btn">
        ← Retour à l'accueil
    </a>

</div>

<footer>
    © 2026 MathiX Games Corporation
</footer>

</body>
</html>
